<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Boost · QR-коды для печати</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #f5f5f7; color: #1e1b4b; padding: 20px; }
  .page { background: #fff; max-width: 820px; margin: 0 auto 20px; padding: 40px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); page-break-after: always; }
  .page:last-child { page-break-after: auto; }
  .brand { font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: #E07461; font-weight: 800; margin-bottom: 6px; }
  .lesson { font-size: 14px; color: #64748b; margin-bottom: 30px; }
  .person-name { font-size: 72px; font-weight: 900; letter-spacing: -2px; line-height: 1; margin-bottom: 10px; background: linear-gradient(135deg, #E07461, #f0c040); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .person-sphere { font-size: 20px; color: #475569; font-weight: 500; margin-bottom: 28px; }
  .qr-box { display: flex; gap: 32px; align-items: center; }
  .qr-box img { width: 280px; height: 280px; border: 1px solid #e2e8f0; border-radius: 12px; }
  .instr { flex: 1; }
  .instr h2 { font-size: 22px; color: #1e1b4b; font-weight: 800; margin-bottom: 12px; }
  .instr ol { padding-left: 20px; font-size: 15px; color: #334155; line-height: 1.7; }
  .instr ol li strong { color: #1e1b4b; }
  .url-hint { margin-top: 18px; padding: 10px 14px; background: #fef3c7; border-radius: 8px; font-family: monospace; font-size: 12px; color: #7c5c00; word-break: break-all; }
  .controls { max-width: 820px; margin: 0 auto 20px; text-align: center; }
  .controls button { background: linear-gradient(135deg, #E07461, #f0c040); color: #fff; border: none; padding: 12px 24px; font-size: 15px; font-weight: 700; border-radius: 10px; cursor: pointer; }
  @media print {
    body { background: #fff; padding: 0; }
    .page { box-shadow: none; margin: 0; border-radius: 0; max-width: 100%; padding: 40px 50px; }
    .controls { display: none; }
  }
</style>
</head>
<body>

<div class="controls">
  <button onclick="window.print()">🖨 Распечатать все QR (8 листов A4)</button>
</div>

<div id="pages"></div>

<script type="module">
import { PARTICIPANTS } from './participants.js';

const pages = document.getElementById('pages');
PARTICIPANTS.forEach(p => {
  pages.innerHTML += `
    <div class="page">
      <div class="brand">neovida · AI Boost · занятие 8</div>
      <div class="lesson">Твоя персональная ссылка — сканируй QR или перейди по URL</div>
      <div class="person-name">${p.name}</div>
      <div class="person-sphere">${p.sphere}</div>
      <div class="qr-box">
        <img src="qr/${p.slug}.png" alt="QR ${p.name}">
        <div class="instr">
          <h2>Что делать</h2>
          <ol>
            <li>Открой <strong>камеру телефона</strong> → наведи на QR слева</li>
            <li>Нажми на всплывающую ссылку</li>
            <li>Увидишь свой экран — в нём <strong>тест</strong> и <strong>карта</strong></li>
          </ol>
          <div class="url-hint">Если QR не сканируется — открой в браузере:<br>aiboost.../lesson-8-app/index.html?user=${p.slug}</div>
        </div>
      </div>
    </div>
  `;
});

// Host QR (для Альберта — на его ноутбук)
pages.innerHTML += `
  <div class="page">
    <div class="brand">neovida · AI Boost · занятие 8 · ВЕДУЩИЙ</div>
    <div class="lesson">Дашборд — открыть на ноутбуке, подключённом к ТВ</div>
    <div class="person-name">Альберт</div>
    <div class="person-sphere">Host · дашборд на ТВ</div>
    <div class="qr-box">
      <img src="qr/_host.png" alt="QR host">
      <div class="instr">
        <h2>Что делать</h2>
        <ol>
          <li>Открой QR через камеру телефона или перейди по URL</li>
          <li>Страница: <strong>дашборд занятия 8</strong> с 4 вкладками</li>
          <li>Держи её открытой в браузере, выведи на ТВ через HDMI</li>
        </ol>
        <div class="url-hint">aiboost.../lesson-8-app/host.html?key=albert2026</div>
      </div>
    </div>
  </div>
`;
</script>

</body>
</html>
